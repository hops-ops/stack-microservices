apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: knativestacks.hops.ops.com.ai
spec:
  group: hops.ops.com.ai
  names:
    kind: KnativeStack
    plural: knativestacks
  scope: Namespaced
  versions:
  - name: v1alpha1
    referenceable: true
    served: true
    schema:
      openAPIV3Schema:
        description: KnativeStack deploys Knative Operator, Knative Serving/Eventing, and optional NATS.
        type: object
        properties:
          spec:
            description: KnativeStackSpec defines the desired state.
            type: object
            properties:
              clusterName:
                description: Name of the target cluster. Used as default for helmProviderConfigRef.name and resource naming.
                type: string
              hostedZone:
                description: DNS hosted zone for Knative Serving domains (e.g. example.com). Configures domain routing.
                type: string
              certManager:
                description: Cert-manager integration for automatic TLS.
                type: object
                properties:
                  enabled:
                    description: Whether to enable cert-manager integration. Defaults to false.
                    type: boolean
                    default: false
                  issuerRef:
                    description: "ClusterIssuer reference. Defaults to: name: letsencrypt-production, kind: ClusterIssuer."
                    type: string
              managementPolicies:
                description: Management policies for all composed resources. Defaults to ["*"].
                type: array
                items:
                  type: string
                default:
                - "*"
              labels:
                description: Custom labels applied to all managed resources.
                type: object
                additionalProperties:
                  type: string
                x-kubernetes-preserve-unknown-fields: true
              helmProviderConfigRef:
                description: Reference to the Helm ProviderConfig. Defaults to clusterName.
                type: object
                properties:
                  name:
                    description: Name of the Helm ProviderConfig.
                    type: string
                  kind:
                    description: Kind of the ProviderConfig. Defaults to ProviderConfig.
                    type: string
                    enum:
                    - ProviderConfig
                    - ClusterProviderConfig
              kubernetesProviderConfigRef:
                description: Reference to the Kubernetes ProviderConfig for creating Object resources on the target cluster. Defaults to clusterName.
                type: object
                properties:
                  name:
                    description: Name of the Kubernetes ProviderConfig.
                    type: string
                  kind:
                    description: Kind of the ProviderConfig. Defaults to ProviderConfig.
                    type: string
                    enum:
                    - ProviderConfig
                    - ClusterProviderConfig
              knativeOperator:
                description: Configuration for the Knative Operator component.
                type: object
                properties:
                  name:
                    description: Release name. Defaults to knative-operator.
                    type: string
                  namespace:
                    description: Namespace for this component. Defaults to knative-operator.
                    type: string
                  values:
                    description: Helm values merged with defaults.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  overrideAllValues:
                    description: Helm values that replace all defaults.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
              knativeServing:
                description: Configuration for the Knative Serving instance.
                type: object
                properties:
                  enabled:
                    description: Whether to install Knative Serving. Defaults to true.
                    type: boolean
                    default: true
                  name:
                    description: KnativeServing resource name. Defaults to knative-serving.
                    type: string
                  namespace:
                    description: Namespace for the KnativeServing resource. Defaults to knative-serving.
                    type: string
                  spec:
                    description: Spec fields merged with defaults.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  overrideAllSpec:
                    description: Spec fields that replace all defaults.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
              knativeEventing:
                description: Configuration for the Knative Eventing instance.
                type: object
                properties:
                  enabled:
                    description: Whether to install Knative Eventing. Defaults to true.
                    type: boolean
                    default: true
                  name:
                    description: KnativeEventing resource name. Defaults to knative-eventing.
                    type: string
                  namespace:
                    description: Namespace for the KnativeEventing resource. Defaults to knative-eventing.
                    type: string
                  spec:
                    description: Spec fields merged with defaults.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  overrideAllSpec:
                    description: Spec fields that replace all defaults.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
              nats:
                description: Configuration for the NATS component.
                type: object
                properties:
                  enabled:
                    description: Whether to install NATS. Defaults to true.
                    type: boolean
                    default: true
                  name:
                    description: Release name. Defaults to nats.
                    type: string
                  namespace:
                    description: Namespace for this component. Defaults to nats.
                    type: string
                  storageClass:
                    description: StorageClass composed for NATS JetStream PVCs. Removes the cluster-default-SC dependency — knative-stack provisions its own SC scoped to NATS. Disable to fall back to the cluster default. Provisioner defaults to the EKS Auto Mode CSI; override on standard EKS (ebs.csi.aws.com), GKE, AKS, etc.
                    type: object
                    properties:
                      enabled:
                        description: Whether to compose a StorageClass and point NATS PVCs at it. Defaults to true when nats.enabled.
                        type: boolean
                        default: true
                      name:
                        description: StorageClass name. Defaults to "knative-nats".
                        type: string
                      provisioner:
                        description: CSI provisioner. Defaults to "ebs.csi.eks.amazonaws.com" (EKS Auto Mode). Set to "ebs.csi.aws.com" on standard EKS w/ EBS CSI addon, or your platform's CSI elsewhere.
                        type: string
                      parameters:
                        description: Provisioner parameters (e.g. type, iops, throughput). Defaults to {type gp3} for EBS.
                        type: object
                        additionalProperties:
                          type: string
                      reclaimPolicy:
                        description: Defaults to Delete.
                        type: string
                        enum:
                        - Delete
                        - Retain
                      volumeBindingMode:
                        description: Defaults to WaitForFirstConsumer.
                        type: string
                        enum:
                        - Immediate
                        - WaitForFirstConsumer
                  values:
                    description: Helm values merged with defaults.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  overrideAllValues:
                    description: Helm values that replace all defaults.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
            required:
            - clusterName
          status:
            description: KnativeStackStatus defines the observed state.
            type: object
            properties:
              ready:
                description: Overall readiness of the Knative stack.
                type: boolean
        required:
        - spec
